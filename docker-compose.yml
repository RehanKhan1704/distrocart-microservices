version: '3.8'

services:

  discovery-server:
    build: ./discovery-server
    ports:
      - "8761:8761"

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - discovery-server

  product-service:
    build: ./product-service
    ports:
      - "8082:8082"
    depends_on:
      - discovery-server

  inventory-service:
    build: ./inventory-service
    ports:
      - "8083:8083"
    depends_on:
      - discovery-server

  order-service:
    build: ./order-service
    ports:
      - "8081:8081"
    depends_on:
      - discovery-server

  auth-service:
    build: ./auth-service
    ports:
      - "8084:8084"
    depends_on:
      - discovery-server